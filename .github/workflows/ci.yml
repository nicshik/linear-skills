name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: [self-hosted, linux, x64, linear-skills-ci]
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        run: |
          uv python install "${{ matrix.python-version }}"
          python_bin="$(uv python find "${{ matrix.python-version }}")"
          venv_dir="$RUNNER_TEMP/linear-skills-python-${{ matrix.python-version }}"
          rm -rf "$venv_dir"
          "$python_bin" -m venv "$venv_dir"
          echo "$venv_dir/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$venv_dir" >> "$GITHUB_ENV"
          "$venv_dir/bin/python" --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ensure runner tools are available
        run: |
          command -v rg
          command -v uv

      - name: Validate repository
        run: scripts/validate.sh
