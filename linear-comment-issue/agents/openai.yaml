interface:
  display_name: "Linear Comment Issue"
  short_description: "Add one Linear issue comment via API"
  brand_color: "#5E6AD2"
  default_prompt: "Use $linear-comment-issue as a narrow fallback to add one comment to a Linear issue through the direct Linear API when the normal connector cannot create it, read and verify the issue first, prefer stable issue keys and --dry-run for checks, treat issue_not_found as a target issue problem rather than a missing API key, and never print the API key."

policy:
  allow_implicit_invocation: false
